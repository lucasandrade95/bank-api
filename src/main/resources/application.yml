spring:
  application:
    name: bank-api
  datasource:
    url: jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  # Em dev/teste o schema e criado pelo Hibernate (H2). O schema versionado
  # por Flyway e aplicado apenas no profile "postgres".
  flyway:
    enabled: false

security:
  jwt:
    # Em producao, sobrescreva via variavel de ambiente SECURITY_JWT_SECRET.
    secret: ${SECURITY_JWT_SECRET:change-me-dev-secret-please-override-in-prod-0123456789}
    expiration-minutes: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Observabilidade: Actuator expoe health/info/metrics. /health e /info ficam
# publicos (uteis para load balancer e probes); os demais exigem autenticacao.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: bank-api
    description: REST API de operacoes bancarias (contas e transacoes)
    version: 0.1.0

server:
  port: 8080

# Inclui o request id (correlation id, definido por RequestIdFilter) em cada
# linha de log, logo apos o nivel — assim os logs de uma mesma chamada ficam
# correlacionaveis. O sufixo ":-" deixa o campo vazio quando nao ha id no MDC.
logging:
  pattern:
    level: "%5p [%X{requestId:-}]"
